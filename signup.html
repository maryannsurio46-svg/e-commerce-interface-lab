<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sign Up - Coffee Shop</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="signup.css">
</head>
<body>
    <form>
        <button style="color: black; background-color: white; text-align: left;" onclick="history.back()"><</button>
        <h1>Create an Account</h1>
        <label for="fullname">Full Name:</label><br>
        <input type="text" id="fullname" name="fullname" required minlength="3"><br><br>

        <label for="email">Email Address:</label><br>
        <input type="email" id="email" name="email" required><br><br>

        <label for="password">Password:</label><br>
        <input type="password" id="password" name="password" required minlength="6"><br><br>

        <label for="confirm">Confirm Password:</label><br>
        <input type="password" id="confirm" name="confirm" required minlength="6"><br><br>

        <button type="submit">Sign Up</button>
    </form>

</body>
</html>
