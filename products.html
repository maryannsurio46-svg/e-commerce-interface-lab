        <h3>Price Range</h3>
        <ul>
            <li><input type="radio" name="price" id="p1"> <label for="p1">₱0 - ₱50</label></li>
            <li><input type="radio" name="price" id="p2"> <label for="p2">₱51 - ₱100</label></li>
            <li><input type="radio" name="price" id="p3"> <label for="p3">₱101 - ₱150</label></li>
        </ul>

      <button id="applyFilter">Apply Filter</button>
