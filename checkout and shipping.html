<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="checkout and shipping.css">
    <title>Checkout - Coffee Shop</title>
</head>
<body>

    <button style="color: black; background-color: white; text-align: left;" onclick="history.back()"><</button>
    <h1>Checkout & Shipping</h1>

    <div class="container">

        <div class="form-section">

           <form id="checkout-form">

    <fieldset>
        <legend>Shipping Address</legend>

        <label for="name">Full Name:</label><br>
        <input type="text" id="name"><br>
        <small class="error-msg"></small><br>

        <label for="street">Street Address:</label><br>
        <input type="text" id="street"><br>
        <small class="error-msg"></small><br>

        <label for="zip">Zip Code:</label><br>
        <input type="text" id="zip"><br>
        <small class="error-msg"></small><br>
    </fieldset>

    <div class="payment-method">
        <h2>Payment Details</h2>

        <input type="radio" id="gcash" name="payment" value="Gcash">
        <label for="gcash">Gcash</label><br>

        <input type="radio" id="cash" name="payment" value="Cash">
        <label for="cash">Cash on Delivery</label><br>

        <small id="payment-error" class="error-msg"></small>
    </div>

    <br>
    <button type="submit
            <button onclick="location.href='account.html'">Place Order</button>

        </div>

        <aside>
            <h2>Order Summary</h2>
            <p>Items Total: ₱00.0</p>
            <p>Shipping Fee: ₱00.0</p>
            <hr>
            <h3>Final Total: ₱00.0</h3>
        </aside>

    </div>

</body>
</html>

<script src="script.js"></script>
