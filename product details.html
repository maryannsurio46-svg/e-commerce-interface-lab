<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coffee Product Detail</title>
</head>
<body>

    <h1>Caramel Latte</h1>

    <!-- Product Details Table -->
    <h2>Product Details</h2>
    <table border="1" cellpadding="8">
        <tr>
            <th>Feature</th>
            <th>Details</th>
        </tr>
        <tr>
            <td>Size</td>
            <td>16 oz (Medium)</td>
        </tr>
        <tr>
            <td>Ingredients</td>
            <td>Espresso, Milk, Caramel Syrup</td>
        </tr>
        <tr>
            <td>Serving</td>
            <td>Hot / Iced</td>
        </tr>
        <tr>
            <td>Price</td>
            <td>₱150</td>
        </tr>
    </table>

    <!-- Add to Cart Form -->
    <h2>Order Now</h2>
    <form>
        <label>Quantity:</label>
        <input type="number" min="1" value="1">
        <br><br>
        <button type="submit">Add to Cart</button>
    </form>

    <!-- Reviews Section -->
    <section>
        <h2>Customer Reviews</h2>

        <article>
            <h4>Ana</h4>
            <blockquote>
                The caramel flavor is perfect and not too sweet. Love it!
            </blockquote>
        </article>

        <article>
            <h4>Mark</h4>
            <blockquote>
                Smooth coffee and great aroma. Will order again!
            </blockquote>
        </article>

    </section>

</body>
</html>
